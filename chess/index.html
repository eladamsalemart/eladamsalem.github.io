:root{
  --bg:#e9e0cd; --surface:#f7f2e6; --surface-2:#fbf8ef; --ink:#1b251e; --muted:#5f7066;
  --line:#d6ccb6; --green:#1f4433; --green-2:#2f6b49; --gold:#c1902c; --gold-soft:#e7c877;
  --board-light:#ecdcbb; --board-dark:#4c7a5c;
  --good:#2f8f56; --bad:#c1543f; --hint:#c1902c;
  --sel:#e0b84a; --lastmove:rgba(193,144,44,.34); --dot:rgba(31,68,51,.34);
  --shadow:0 12px 30px rgba(23,40,30,.10); --shadow-sm:0 4px 12px rgba(23,40,30,.08);
  --radius:16px; --font:'Heebo',system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:ui-monospace,'SF Mono','Menlo','Consolas',monospace;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#0f1512; --surface:#18211c; --surface-2:#1e2922; --ink:#ece5d3; --muted:#94a79b;
  --line:#2b3730; --green:#57b483; --green-2:#6cc796; --gold:#e0b352; --gold-soft:#f0d488;
  --board-light:#a9b79c; --board-dark:#3c5f49;
  --good:#49b877; --bad:#d8674f; --hint:#e0b352;
  --sel:#e0b352; --lastmove:rgba(224,179,82,.30); --dot:rgba(220,230,215,.30);
  --shadow:0 12px 34px rgba(0,0,0,.4); --shadow-sm:0 4px 12px rgba(0,0,0,.3);
}}
:root[data-theme="dark"]{
  --bg:#0f1512; --surface:#18211c; --surface-2:#1e2922; --ink:#ece5d3; --muted:#94a79b;
  --line:#2b3730; --green:#57b483; --green-2:#6cc796; --gold:#e0b352; --gold-soft:#f0d488;
  --board-light:#a9b79c; --board-dark:#3c5f49;
  --good:#49b877; --bad:#d8674f; --hint:#e0b352;
  --sel:#e0b352; --lastmove:rgba(224,179,82,.30); --dot:rgba(220,230,215,.30);
  --shadow:0 12px 34px rgba(0,0,0,.4); --shadow-sm:0 4px 12px rgba(0,0,0,.3);
}
:root[data-theme="light"]{
  --bg:#e9e0cd; --surface:#f7f2e6; --surface-2:#fbf8ef; --ink:#1b251e; --muted:#5f7066;
  --line:#d6ccb6; --green:#1f4433; --green-2:#2f6b49; --gold:#c1902c; --gold-soft:#e7c877;
  --board-light:#ecdcbb; --board-dark:#4c7a5c;
  --good:#2f8f56; --bad:#c1543f; --hint:#c1902c;
  --sel:#e0b84a; --lastmove:rgba(193,144,44,.34); --dot:rgba(31,68,51,.34);
  --shadow:0 12px 30px rgba(23,40,30,.10); --shadow-sm:0 4px 12px rgba(23,40,30,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;-webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:contain}
.sq,.tab,.ctrl,.opt,.icon-btn,.seg button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
.app{max-width:1180px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;gap:18px;
  padding:max(18px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(40px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left))}

/* ---------- header ---------- */
header.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand .logo{width:44px;height:44px;border-radius:12px;background:var(--green);color:var(--gold-soft);
  display:grid;place-items:center;font-size:26px;box-shadow:var(--shadow-sm);
  font-family:'DejaVu Sans','Segoe UI Symbol','Noto Sans Symbols2',sans-serif}
.brand h1{font-size:21px;font-weight:800;letter-spacing:-.3px;line-height:1.1}
.brand p{font-size:13px;color:var(--muted);font-weight:500}
.top .spacer{flex:1}
.progress-chip{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
  border-radius:100px;padding:7px 14px 7px 8px;box-shadow:var(--shadow-sm)}
.progress-chip .xp{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#2a1f05;
  display:grid;place-items:center;font-weight:800;font-size:13px}
.progress-chip b{font-weight:800;font-size:14px}
.progress-chip small{color:var(--muted);font-size:12px;display:block;line-height:1}
.icon-btn{width:40px;height:40px;border-radius:11px;background:var(--surface);border:1px solid var(--line);
  display:grid;place-items:center;font-size:19px;box-shadow:var(--shadow-sm);transition:transform .1s;flex:none}
.icon-btn:active{transform:scale(.92)}
@media (max-width:560px){
  header.top{gap:10px;justify-content:space-between}
  .top .spacer{display:none}
  .brand h1{font-size:17px} .brand p{font-size:11.5px} .brand .logo{width:40px;height:40px;font-size:23px}
  .progress-chip{padding:6px 11px 6px 6px} .progress-chip small{font-size:11px} .progress-chip b{font-size:13px}
  .tab{min-width:0;flex:1 1 auto;padding:10px 8px;font-size:14px}
}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:6px;box-shadow:var(--shadow-sm);flex-wrap:wrap}
.tab{flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 12px;border-radius:10px;font-weight:700;font-size:15px;color:var(--muted);transition:all .15s;white-space:nowrap}
.tab .ti{font-size:18px;font-family:'DejaVu Sans','Segoe UI Symbol','Noto Sans Symbols2',sans-serif}
.tab:hover{color:var(--ink);background:var(--surface-2)}
.tab.active{background:var(--green);color:#fff;box-shadow:0 6px 16px rgba(31,68,51,.28)}
.tab.active .ti{color:var(--gold-soft)}

/* ---------- main layout ---------- */
.main{display:grid;grid-template-columns:minmax(320px,560px) 372px;gap:22px;align-items:start;justify-content:center}
.board-col{min-width:0}
@media (max-width:940px){.main{grid-template-columns:minmax(0,560px);justify-content:center}}

/* ---------- board ---------- */
.board-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow)}
.board-frame{position:relative;background:var(--green);border-radius:10px;padding:22px;box-shadow:inset 0 2px 8px rgba(0,0,0,.15)}
.board{position:relative;width:100%;aspect-ratio:1;display:grid;grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);border-radius:4px;overflow:hidden;touch-action:manipulation}
.sq{position:relative;display:grid;place-items:center;user-select:none}
.sq.light{background:var(--board-light)} .sq.dark{background:var(--board-dark)}
.sq.sel{box-shadow:inset 0 0 0 4px var(--sel)}
.sq.last{background-image:linear-gradient(var(--lastmove),var(--lastmove))}
.sq.check{box-shadow:inset 0 0 0 4px var(--bad);background-image:radial-gradient(circle,rgba(193,84,63,.5),transparent 72%)}
.sq .dot{position:absolute;width:30%;height:30%;border-radius:50%;background:var(--dot);pointer-events:none}
.sq.cap .dot{width:86%;height:86%;background:transparent;border:5px solid var(--dot);box-sizing:border-box}
.piece{font-size:min(9vw,52px);line-height:1;pointer-events:none;
  font-family:'DejaVu Sans','Segoe UI Symbol','Noto Sans Symbols2','Apple Symbols',sans-serif;
  transition:transform .04s}
.board.big .piece{font-size:52px}
.piece.w{color:#f6efdc;-webkit-text-stroke:1.4px #22201c;text-shadow:0 2px 2px rgba(0,0,0,.28)}
.piece.b{color:#1c1a17;-webkit-text-stroke:1.1px #000;text-shadow:0 1px 1px rgba(255,255,255,.22)}
.coord{position:absolute;font-size:11px;font-weight:700;color:rgba(246,239,220,.85);font-family:var(--mono)}
.coord.file{bottom:4px;right:6px} .coord.rank{top:4px;left:6px}
.board-frame .edge{position:absolute;font-size:12px;font-weight:700;color:rgba(246,239,220,.9);font-family:var(--mono)}

.controls{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.ctrl{flex:1;min-width:80px;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 10px;border-radius:11px;background:var(--surface-2);border:1px solid var(--line);
  font-weight:700;font-size:14px;color:var(--ink);transition:all .12s}
.ctrl:hover{background:var(--green);color:#fff;border-color:var(--green)}
.ctrl.primary{background:var(--gold);border-color:var(--gold);color:#2a1f05}
.ctrl.primary:hover{filter:brightness(1.06);background:var(--gold)}

/* ---------- side panel ---------- */
.panel{display:flex;flex-direction:column;gap:16px}

  padding:18px;box-shadow:var(--shadow-sm)}

  padding:3px 9px;border-radius:20px;letter-spacing:.3px}

.select-list{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:12px;background:var(--surface-2);
  border:1px solid var(--line);text-align:right;transition:all .12s;width:100%}

  display:grid;place-items:center;font-size:18px;flex:none;
  font-family:'DejaVu Sans','Segoe UI Symbol','Noto Sans Symbols2',sans-serif}
.opt .badge.done{background:var(--good);color:#fff}
.opt .txt{flex:1;min-width:0}
.opt .txt b{font-size:14.5px;font-weight:700;display:block}
.opt .txt small{font-size:12.5px;color:var(--muted);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.opt .chev{color:var(--muted);font-size:15px}

.coach{border-radius:12px;padding:14px;font-size:14.5px;line-height:1.55;background:var(--surface-2);border:1px solid var(--line)}
.coach.good{background:rgba(47,143,86,.12);border-color:rgba(47,143,86,.4)}
.coach.bad{background:rgba(193,84,63,.12);border-color:rgba(193,84,63,.4)}
.coach.info{background:rgba(193,144,44,.1);border-color:rgba(193,144,44,.35)}

.coach.good .tag{color:var(--good)} .coach.bad .tag{color:var(--bad)} .coach.info .tag{color:var(--gold)}

  border-radius:12px;padding:6px;max-height:190px;overflow-y:auto;font-variant-numeric:tabular-nums}

.statrow{display:flex;gap:10px;margin-top:2px}
.stat{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center}
.stat b{font-size:20px;font-weight:800;display:block;font-variant-numeric:tabular-nums}
.stat small{font-size:11.5px;color:var(--muted)}

.seg{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:5px}
.seg button{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:13.5px;color:var(--muted)}

.pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:20px}
.pill.w{background:#f6efdc;color:#3a3428;border:1px solid #d8cbA5;border:1px solid #d8cba5}
.pill.b{background:#2a2a2a;color:#f0ece0}

/* promotion modal */
.modal{position:fixed;inset:0;background:rgba(15,21,18,.55);display:grid;place-items:center;z-index:50;backdrop-filter:blur(3px)}
.modal .box{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);text-align:center}

.promo-row{display:flex;gap:10px}

  font-size:40px;display:grid;place-items:center;transition:all .12s;
  font-family:'DejaVu Sans','Segoe UI Symbol','Noto Sans Symbols2',sans-serif}

.hidden{display:none!important}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

<body>
<div class="app" dir="rtl">
  <header class="top">
    <div class="brand">
      <div class="logo">♞</div>
      <div>
        <h1>מאמן השחמט · 900 → 1400</h1>
        <p>תרגול חי: פתיחות, רעיונות וסיומים</p>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="progress-chip">
      <div class="xp" id="xp">0</div>
      <div id="hstat"><b>0 XP</b><small>דיוק 0%</small></div>
    </div>
    <button class="icon-btn" id="themeBtn" title="מצב תצוגה" aria-label="החלף מצב תצוגה">☾</button>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-m="openings"><span class="ti">♙</span>פתיחות</button>
    <button class="tab" data-m="puzzles"><span class="ti">♞</span>מוטיבים</button>
    <button class="tab" data-m="endgames"><span class="ti">♜</span>סיומים</button>
    <button class="tab" data-m="play"><span class="ti">♛</span>משחק חי</button>
  </nav>

  <div class="main">
    <div class="board-col">
      <div class="board-wrap">
        <div class="board-frame" dir="ltr">
          <div class="board" id="board"></div>
        </div>
        <div class="controls">
          <button class="ctrl" id="c-undo">↶ אחורה</button>
          <button class="ctrl" id="c-hint">💡 רמז</button>
          <button class="ctrl" id="c-flip">⇅ הפוך לוח</button>
          <button class="ctrl" id="c-reset">↺ אתחל</button>
          <button class="ctrl primary hidden" id="c-next">התרגיל הבא ›</button>
        </div>
      </div>
      <div class="card" style="margin-top:16px">
        <h2>רשימת מהלכים</h2>
        <div class="movelist" id="movelist"></div>
      </div>
    </div>

    <div class="panel" id="panel"></div>
  </div>

  <div class="footer-note">נבנה מתוך המצגת <b>“מ־900 ל־1400”</b> · לוח מלא עם מהלכים חוקיים, מאמן פתיחות ותרגול מול המחשב</div>
</div>

<script>
/* Minimal, correct chess engine — board[0]=a8 ... board[63]=h1.
   Pieces: PNBRQK white, pnbrqk black, null empty. Verified via perft. */
(function(global){
  const FILES='abcdefgh';
  function sqName(i){ return FILES[i%8] + (8 - ((i/8)|0)); }
  function nameSq(s){ return (8-parseInt(s[1]))*8 + FILES.indexOf(s[0]); }
  const isW = p => p && p===p.toUpperCase();
  const isB = p => p && p===p.toLowerCase();
  const colorOf = p => !p ? null : (isW(p)?'w':'b');

  function parseFEN(fen){
    const parts = fen.trim().split(/\s+/);
    const board = new Array(64).fill(null);
    let i=0;
    for(const ch of parts[0]){
      if(ch==='/') continue;
      if(/\d/.test(ch)){ i += parseInt(ch); }
      else { board[i++] = ch; }
    }
    return {
      board,
      turn: parts[1]||'w',
      castling: parts[2]||'-',
      ep: (parts[3]&&parts[3]!=='-') ? nameSq(parts[3]) : -1,
      half: parseInt(parts[4]||'0'),
      full: parseInt(parts[5]||'1')
    };
  }
  function toFEN(s){
    let rows=[];
    for(let r=0;r<8;r++){
      let row='',empty=0;
      for(let f=0;f<8;f++){
        const p=s.board[r*8+f];
        if(!p){ empty++; }
        else { if(empty){row+=empty;empty=0;} row+=p; }
      }
      if(empty) row+=empty;
      rows.push(row);
    }
    return rows.join('/')+' '+s.turn+' '+(s.castling||'-')+' '+(s.ep<0?'-':sqName(s.ep))+' '+s.half+' '+s.full;
  }

  const N_OFF=[-17,-15,-10,-6,6,10,15,17];
  const K_OFF=[-9,-8,-7,-1,1,7,8,9];
  const B_DIR=[-9,-7,7,9];
  const R_DIR=[-8,-1,1,8];
  function onBoard(i){ return i>=0 && i<64; }
  // step with file-distance guard to avoid wrap
  function slide(board,from,dir,color,out){
    let cur=from;
    while(true){
      const nf=(cur%8), next=cur+dir;
      if(!onBoard(next)) break;
      const df=Math.abs((next%8)-nf);
      if(df>1) break; // wrapped horizontally
      const t=board[next];
      if(!t){ out.push({from,to:next}); }
      else { if(colorOf(t)!==color) out.push({from,to:next}); break; }
      cur=next;
    }
  }
  function knightK(board,from,offs,color,out){
    const ff=from%8;
    for(const o of offs){
      const to=from+o;
      if(!onBoard(to)) continue;
      const df=Math.abs((to%8)-ff);
      // knight max file dist 2, king max 1
      if(o===-17||o===-15||o===15||o===17){ if(df!==1) continue; }
      else if(o===-10||o===-6||o===6||o===10){ if(df!==2) continue; }
      else { if(df>1) continue; }
      const t=board[to];
      if(!t||colorOf(t)!==color) out.push({from,to});
    }
  }

  function isAttacked(board, sq, by){ // is sq attacked by color `by`
    const ff=sq%8;
    // pawns
    if(by==='w'){ // white pawns attack upward (toward rank 8 => lower index)
      for(const o of [7,9]){ const p=sq+o; if(onBoard(p)&&Math.abs((p%8)-ff)===1 && board[p]==='P') return true; }
    } else {
      for(const o of [-7,-9]){ const p=sq+o; if(onBoard(p)&&Math.abs((p%8)-ff)===1 && board[p]==='p') return true; }
    }
    // knights
    for(const o of N_OFF){ const p=sq+o; if(!onBoard(p))continue; const df=Math.abs((p%8)-ff);
      if(o===-17||o===-15||o===15||o===17){ if(df!==1)continue; } else { if(df!==2)continue; }
      const t=board[p]; if(t&&colorOf(t)===by&&t.toUpperCase()==='N') return true; }
    // king
    for(const o of K_OFF){ const p=sq+o; if(!onBoard(p))continue; if(Math.abs((p%8)-ff)>1)continue;
      const t=board[p]; if(t&&colorOf(t)===by&&t.toUpperCase()==='K') return true; }
    // sliding: bishop/queen diagonals
    for(const dir of B_DIR){ let cur=sq; while(true){ const nf=cur%8, nx=cur+dir; if(!onBoard(nx))break; if(Math.abs((nx%8)-nf)>1)break; const t=board[nx];
      if(t){ if(colorOf(t)===by&&(t.toUpperCase()==='B'||t.toUpperCase()==='Q')) return true; break; } cur=nx; } }
    // sliding: rook/queen lines
    for(const dir of R_DIR){ let cur=sq; while(true){ const nf=cur%8, nx=cur+dir; if(!onBoard(nx))break; if(Math.abs((nx%8)-nf)>1)break; const t=board[nx];
      if(t){ if(colorOf(t)===by&&(t.toUpperCase()==='R'||t.toUpperCase()==='Q')) return true; break; } cur=nx; } }
    return false;
  }

  function kingSquare(board,color){
    const k = color==='w'?'K':'k';
    for(let i=0;i<64;i++) if(board[i]===k) return i;
    return -1;
  }

  function pseudoMoves(s){
    const {board,turn,ep,castling}=s;
    const out=[];
    const me=turn, opp=turn==='w'?'b':'w';
    for(let i=0;i<64;i++){
      const p=board[i]; if(!p||colorOf(p)!==me) continue;
      const type=p.toUpperCase();
      const ff=i%8, rr=(i/8)|0;
      if(type==='P'){
        const dir = me==='w'? -8 : 8;
        const startRank = me==='w'? 6 : 1;
        const promoRank = me==='w'? 0 : 7;
        const one=i+dir;
        if(onBoard(one)&&!board[one]){
          if(((one/8)|0)===promoRank) for(const pr of ['Q','R','B','N']) out.push({from:i,to:one,promo:pr});
          else out.push({from:i,to:one});
          if(rr===startRank){ const two=i+2*dir; if(!board[two]) out.push({from:i,to:two,dbl:true}); }
        }
        for(const dc of [-1,1]){
          const cap=i+dir+dc; if(!onBoard(cap))continue; if(Math.abs((cap%8)-ff)!==1)continue;
          const t=board[cap];
          if(t&&colorOf(t)===opp){
            if(((cap/8)|0)===promoRank) for(const pr of ['Q','R','B','N']) out.push({from:i,to:cap,promo:pr,cap:true});
            else out.push({from:i,to:cap,cap:true});
          } else if(cap===ep){ out.push({from:i,to:cap,epCap:true}); }
        }
      } else if(type==='N'){ knightK(board,i,N_OFF,me,out); }
      else if(type==='K'){
        knightK(board,i,K_OFF,me,out);
        // castling
        if(me==='w'){
          if(castling.includes('K') && !board[61]&&!board[62] && board[63]==='R' && board[60]==='K'
             && !isAttacked(board,60,'b')&&!isAttacked(board,61,'b')&&!isAttacked(board,62,'b')) out.push({from:60,to:62,castle:'K'});
          if(castling.includes('Q') && !board[59]&&!board[58]&&!board[57] && board[56]==='R' && board[60]==='K'
             && !isAttacked(board,60,'b')&&!isAttacked(board,59,'b')&&!isAttacked(board,58,'b')) out.push({from:60,to:58,castle:'Q'});
        } else {
          if(castling.includes('k') && !board[5]&&!board[6] && board[7]==='r' && board[4]==='k'
             && !isAttacked(board,4,'w')&&!isAttacked(board,5,'w')&&!isAttacked(board,6,'w')) out.push({from:4,to:6,castle:'k'});
          if(castling.includes('q') && !board[3]&&!board[2]&&!board[1] && board[0]==='r' && board[4]==='k'
             && !isAttacked(board,4,'w')&&!isAttacked(board,3,'w')&&!isAttacked(board,2,'w')) out.push({from:4,to:2,castle:'q'});
        }
      }
      else if(type==='B'){ for(const d of B_DIR) slide(board,i,d,me,out); }
      else if(type==='R'){ for(const d of R_DIR) slide(board,i,d,me,out); }
      else if(type==='Q'){ for(const d of B_DIR.concat(R_DIR)) slide(board,i,d,me,out); }
    }
    return out;
  }

  function applyMove(s,m){
    const b=s.board.slice();
    const p=b[m.from];
    const me=colorOf(p);
    const captured = b[m.to];
    let castling=s.castling, ep=-1;
    b[m.to]= m.promo ? (me==='w'?m.promo:m.promo.toLowerCase()) : p;
    b[m.from]=null;
    if(m.epCap){ const capSq = me==='w'? m.to+8 : m.to-8; b[capSq]=null; }
    if(m.castle==='K'){ b[61]=b[63]; b[63]=null; }
    if(m.castle==='Q'){ b[59]=b[56]; b[56]=null; }
    if(m.castle==='k'){ b[5]=b[7]; b[7]=null; }
    if(m.castle==='q'){ b[3]=b[0]; b[0]=null; }
    if(m.dbl){ ep = me==='w'? m.from-8 : m.from+8; }
    // update castling rights
    const rm=(ch)=>{ castling=castling.replace(ch,''); };
    const P=p.toUpperCase();
    if(P==='K'){ if(me==='w'){rm('K');rm('Q');} else {rm('k');rm('q');} }
    if(m.from===63||m.to===63) rm('K');
    if(m.from===56||m.to===56) rm('Q');
    if(m.from===7||m.to===7) rm('k');
    if(m.from===0||m.to===0) rm('q');
    if(castling==='') castling='-';
    const half = (P==='P'||captured||m.epCap)?0:s.half+1;
    const full = me==='b'? s.full+1 : s.full;
    return {board:b, turn: me==='w'?'b':'w', castling, ep, half, full};
  }

  function legalMoves(s){
    const out=[];
    const me=s.turn;
    for(const m of pseudoMoves(s)){
      const ns=applyMove(s,m);
      if(!isAttacked(ns.board, kingSquare(ns.board,me), me==='w'?'b':'w')) out.push(m);
    }
    return out;
  }
  function inCheck(s,color){ color=color||s.turn; return isAttacked(s.board,kingSquare(s.board,color), color==='w'?'b':'w'); }

  function moveToSAN(s,m){
    const p=s.board[m.from], type=p.toUpperCase();
    if(m.castle==='K'||m.castle==='k') return 'O-O'+suffix(s,m);
    if(m.castle==='Q'||m.castle==='q') return 'O-O-O'+suffix(s,m);
    const capture = m.epCap || !!s.board[m.to];
    let san='';
    if(type==='P'){
      if(capture) san = FILES[m.from%8] + 'x';
      san += sqName(m.to);
      if(m.promo) san += '='+m.promo;
    } else {
      san = type;
      // disambiguation
      const others = legalMoves(s).filter(x=> x.to===m.to && x.from!==m.from && s.board[x.from] && s.board[x.from].toUpperCase()===type);
      if(others.length){
        const sameFile=others.some(x=> (x.from%8)===(m.from%8));
        const sameRank=others.some(x=> ((x.from/8)|0)===((m.from/8)|0));
        if(!sameFile) san+=FILES[m.from%8];
        else if(!sameRank) san+=(8-((m.from/8)|0));
        else san+=sqName(m.from);
      }
      if(capture) san+='x';
      san+=sqName(m.to);
    }
    return san+suffix(s,m);
  }
  function suffix(s,m){ const ns=applyMove(s,m); if(inCheck(ns, ns.turn)){ return legalMoves(ns).length? '+':'#'; } return ''; }

  function parseSAN(s, san){
    san=san.replace(/[+#!?]/g,'').trim();
    const moves=legalMoves(s);
    if(san==='O-O'||san==='0-0'){ return moves.find(m=>m.castle==='K'||m.castle==='k'); }
    if(san==='O-O-O'||san==='0-0-0'){ return moves.find(m=>m.castle==='Q'||m.castle==='q'); }
    for(const m of moves){ if(moveToSAN(s,m).replace(/[+#]/g,'')===san) return m; }
    // fallback loose match
    for(const m of moves){ if(moveToSAN(s,m).replace(/[+#=]/g,'')===san.replace(/[=]/g,'')) return m; }
    return null;
  }

  function perft(s,d){ if(d===0) return 1; let n=0; for(const m of legalMoves(s)){ n+=perft(applyMove(s,m),d-1); } return n; }

  const START='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';

  if(C.inCheck(S.st)){
    const loser=S.st.turn;
    const humanWon = (S.mode==='play'&&loser!==S.playSide) || (S.mode==='endgames'&&loser!==S.eg.side);
    onGameEnd(humanWon?'win':'loss', 'מט!');
  } else {
    onGameEnd('draw','פט — תיקו.');
  }
  return true;
}
function onGameEnd(result,label){
  renderBoard();
  if(S.mode==='play'){ P.games++; if(result==='win')addXP(20); saveProg();
    coach(result==='win'?'good':(result==='loss'?'bad':'info'), result==='win'?'ניצחון!':result==='loss'?'הפסד':'תיקו', label+' '+(result==='win'?'כל הכבוד!':result==='loss'?'המשך להתאמן.':'')); }
  if(S.mode==='endgames'){
    if(result==='win'){ if(!P.endgames[S.eg.id]){P.endgames[S.eg.id]=1;addXP(25);} else addXP(5); saveProg();
      coach('good','הצלחת! ✔','השלמת את התרגיל: '+S.eg.name+'. '+S.eg.tip); }
    else coach('bad', result==='draw'?'תיקו':'לא הושג', label+' נסה שוב — '+S.eg.tip);
  }
  renderPanel();
}

/* ---------------- promotion ---------------- */
function showPromo(from,to,moves){
  S.locked=true;
  const side=S.st.turn;
  const modal=el('div','modal'); const box=el('div','box');
  box.appendChild(el('h3',null,'בחר כלי להכתרה'));
  const row=el('div','promo-row');
  ['Q','R','B','N'].forEach(pr=>{
    const b=el('button','piece '+(side==='w'?'w':'b')); b.textContent=GLYPH[pr.toLowerCase()];
    b.onclick=()=>{ document.body.removeChild(modal); S.locked=false; const mv=moves.find(m=>m.promo===pr); finishAttempt(mv); };
    row.appendChild(b);
  });
  box.appendChild(row); modal.appendChild(box); document.body.appendChild(modal);
}

/* ---------------- OPENINGS mode ---------------- */
function startOpening(op){
  S.op=op; S.opPly=0; S.opMistake=false; S.mode='openings';
  S.st=C.parseFEN(C.START); S.history=[]; S.last=null; S.gameOver=false; S.sel=-1; S.targets=[];
  S.orientation=op.side;
  renderBoard(); renderMoveList();
  // if user is black, engine plays first white book move
  maybeAutoBookMove();
  renderPanel();
}
function maybeAutoBookMove(){
  if(S.opPly<S.op.line.length && S.st.turn!==S.op.side){
    const san=S.op.line[S.opPly];
    const m=C.parseSAN(S.st,san);
    S.locked=true; renderPanel();
    setTimeout(()=>{ commit(m); S.opPly++; S.locked=false; renderPanel(); }, 300);
  }
}
function handleOpeningMove(move){
  const expected=C.parseSAN(S.st,S.op.line[S.opPly]);
  P.attempts++;
  if(expected && expected.from===move.from && expected.to===move.to && (!expected.promo||expected.promo===move.promo)){
    P.correct++;
    commit(move); S.opPly++;
    const ideaTxt=S.op.ideas[S.opPly] || 'מהלך נכון!';
    if(S.opPly>=S.op.line.length){
      // done
      if(!S.opMistake && !P.openings[S.op.id]){ P.openings[S.op.id]=1; addXP(30); }
      else { addXP(8); }
      saveProg();
      coach('good','סיימת את הקו! ✔','עברת את כל '+(S.op.line.length)+' המהלכים של '+S.op.name+'. '+(S.opMistake?'':'ללא טעויות — מעולה!'));
    } else {
      coach('good','נכון! ✔', ideaTxt);
      maybeAutoBookMove();
    }
    saveProg(); renderHeader();
  } else {
    P.attempts--; // don't count as attempt of accuracy? keep counting
    P.attempts++; S.opMistake=true; saveProg();
    coach('bad','לא המהלך של הקו','זה מהלך חוקי, אבל לא זה שמלמדת הפתיחה. נסה שוב — או לחץ "רמז".');
    shakeBoard();
  }
  renderPanel();
}
function revealOpeningMove(){
  if(!humanToMove()) return;
  const san=S.op.line[S.opPly];
  const m=C.parseSAN(S.st,san);
  S.sel=m.from; S.targets=[m.to]; renderBoard();
  coach('info','רמז','המהלך הבא בקו הוא '+prettySAN(san)+'. לחץ עליו כדי לבצע.');
}

/* ---------------- PUZZLES mode ---------------- */
function startPuzzle(pz){
  S.pz=pz; S.pzSolved=false; S.mode='puzzles';
  S.st=C.parseFEN(pz.fen); S.history=[]; S.last=null; S.gameOver=false; S.sel=-1; S.targets=[];
  S.orientation=S.st.turn;
  renderBoard(); renderMoveList();
  coach('info', pz.theme, 'התור של '+(S.st.turn==='w'?'הלבן':'השחור')+'. מצא את המהלך שממחיש: '+pz.theme+'.');
  renderPanel();
}
function acceptedCanon(pz){
  const s=C.parseFEN(pz.fen);
  return pz.solutions.map(sol=>{ const m=C.parseSAN(s,sol); return m?C.moveToSAN(s,m).replace(/[+#]/g,''):sol; });
}
function handlePuzzleMove(move){
  P.attempts++;
  const san=C.moveToSAN(S.st,move).replace(/[+#]/g,'');
  const ok=acceptedCanon(S.pz).includes(san);
  if(ok){
    P.correct++; S.pzSolved=true;
    commit(move);
    if(!P.puzzles[S.pz.theme]){ P.puzzles[S.pz.theme]=1; addXP(15); } else addXP(4);
    saveProg();
    coach('good','פתרת! ✔', S.pz.idea);
  } else {
    saveProg();
    coach('bad','לא המהלך הנכון', 'זה לא הרעיון כאן. נסה שוב, או לחץ "רמז" כדי לראות את הפתרון.');
    shakeBoard();
  }
  renderHeader(); renderPanel();
}
function revealPuzzle(){
  if(S.pzSolved) return;
  const s=C.parseFEN(S.pz.fen); const m=C.parseSAN(s,S.pz.solutions[0]);
  S.sel=m.from; S.targets=[m.to]; renderBoard();
  coach('info','רמז','הפתרון: '+prettySAN(S.pz.solutions[0])+'. '+S.pz.idea);
}
function nextPuzzle(){
  const list=PUZZLES; const i=list.indexOf(S.pz);
  startPuzzle(list[(i+1)%list.length]);
}

/* ---------------- ENDGAMES mode ---------------- */
function startEndgame(eg){
  S.eg=eg; S.mode='endgames';
  S.st=C.parseFEN(eg.fen); S.history=[]; S.last=null; S.gameOver=false; S.sel=-1; S.targets=[];
  S.orientation=eg.side;
  renderBoard(); renderMoveList();
  coach('info', eg.name, eg.goal+' טיפ: '+eg.tip);
  renderPanel();
}

/* ---------------- PLAY mode ---------------- */
function startPlay(){
  S.mode='play'; S.gameOver=false;
  S.st=C.parseFEN(C.START); S.history=[]; S.last=null; S.sel=-1; S.targets=[];
  S.orientation=S.playSide;
  renderBoard(); renderMoveList();
  coach('info','משחק חדש','אתה משחק ב'+(S.playSide==='w'?'לבן':'שחור')+'. בהצלחה!');
  if(S.st.turn!==S.playSide) aiMove();
  renderPanel();
}

/* ---------------- controls ---------------- */
function undo(){
  if(S.locked) return;
  if(S.mode==='play'||S.mode==='endgames'){
    // undo back to human's turn (pop until human to move or empty)
    const side = S.mode==='play'?S.playSide:S.eg.side;
    let popped=false;
    while(S.history.length){ const h=S.history.pop(); S.st=C.parseFEN(h.fen); popped=true; if(S.st.turn===side) break; }
    if(popped){ S.gameOver=false; S.last=null; S.sel=-1;S.targets=[]; renderBoard(); renderMoveList(); renderPanel(); }
  } else if(S.mode==='openings'){
    // step back one full step (user+opponent)
    if(S.history.length){ const target=Math.max(0,S.history.length-2);
      const h=S.history[target]; S.st=C.parseFEN(h.fen); S.history=S.history.slice(0,target);
      S.opPly=target; S.last=null; renderBoard(); renderMoveList(); coach('info','חזרה','חזרת אחורה. המשך מכאן.'); renderPanel(); }
  }
}
function flip(){ S.orientation=S.orientation==='w'?'b':'w'; renderBoard(); }
function hint(){
  if(S.mode==='openings') revealOpeningMove();
  else if(S.mode==='puzzles') revealPuzzle();
  else if(S.mode==='endgames'){ const m=AI.bestMove(S.st,3); if(m){S.sel=m.from;S.targets=[m.to];renderBoard();coach('info','רמז','נסה '+prettySAN(C.moveToSAN(S.st,m))+'.');} }
}
function resetCurrent(){
  if(S.mode==='openings'&&S.op) startOpening(S.op);
  else if(S.mode==='puzzles'&&S.pz) startPuzzle(S.pz);
  else if(S.mode==='endgames'&&S.eg) startEndgame(S.eg);
  else if(S.mode==='play') startPlay();
}
function shakeBoard(){ const b=$('#board'); b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake'); }

/* ---------------- helpers ---------------- */
function prettySAN(s){ return s; }
function coach(kind,tag,txt){ S._coach={kind,tag,txt}; }

/* ---------------- rendering: header / movelist / panel ---------------- */
function renderHeader(){
  const acc = P.attempts? Math.round(100*P.correct/P.attempts):0;
  $('#xp').textContent = P.xp;
  $('#hstat').innerHTML = '<b>'+P.xp+' XP</b><small>דיוק '+acc+'% · '+P.games+' משחקים</small>';
}
function renderMoveList(){
  const box=$('#movelist'); if(!box) return; box.innerHTML='';
  if(!S.history.length){ box.appendChild(el('div','empty','אין מהלכים עדיין')); return; }
  const sans=S.history.map(h=>h.san);
  for(let i=0;i<sans.length;i+=2){
    const row=el('div','mvrow');
    row.appendChild(el('div','num',(i/2+1)+'.'));
    row.appendChild(el('div','mv'+(i===sans.length-1?' on':''),sans[i]||''));
    row.appendChild(el('div','mv'+(i+1===sans.length-1?' on':''),sans[i+1]||''));
    box.appendChild(row);
  }
  box.scrollTop=box.scrollHeight;
}
function coachCard(){
  const c=S._coach; if(!c) return '';
  return '<div class="coach '+c.kind+'"><div class="tag">'+tagIcon(c.kind)+c.tag+'</div>'+c.txt+'</div>';
}
function tagIcon(k){ return k==='good'?'✔ ':k==='bad'?'✕ ':'♟ '; }

function renderPanel(){
  const P0=$('#panel'); P0.innerHTML='';
  if(S.mode==='openings') P0.appendChild(panelOpenings());
  else if(S.mode==='puzzles') P0.appendChild(panelPuzzles());
  else if(S.mode==='endgames') P0.appendChild(panelEndgames());
  else P0.appendChild(panelPlay());
  // shared move list + controls card appended to board side handled separately
  renderControls();
}
function renderControls(){
  const undoBtn=$('#c-undo'), hintBtn=$('#c-hint'), nextBtn=$('#c-next');
  const showUndo = (S.mode==='play'||S.mode==='endgames'||S.mode==='openings');
  undoBtn.classList.toggle('hidden', !showUndo);
  undoBtn.disabled = S.history.length===0;
  const showHint = (S.mode!=='play');
  hintBtn.classList.toggle('hidden', !showHint);
  nextBtn.classList.toggle('hidden', S.mode!=='puzzles');
}

/* panel builders */
function wrap(){ const d=el('div','panel'); return d; }
function openingPickerCard(){
  const card=el('div','card');
  card.appendChild(el('h2',null,'<span class="k">פתיחות</span> בחר פתיחה לתרגול'));
  card.appendChild(el('div','sub','שחק את הצד שלך; היריב עונה בספר. המטרה — להבין את הרעיון בכל מהלך.'));
  const list=el('div','select-list');
  OPENINGS.forEach(o=>{
    const b=el('button','opt'+(S.op&&S.op.id===o.id?' active':''));
    const done=P.openings[o.id];
    b.innerHTML='<div class="badge'+(done?' done':'')+'">'+(o.side==='w'?'♔':'♚')+'</div>'+
      '<div class="txt"><b>'+o.name+'</b><small>'+o.summary+'</small></div>'+
      '<div class="chev">'+(done?'✔':'‹')+'</div>';
    b.onclick=()=>{ startOpening(o); };
    list.appendChild(b);
  });
  card.appendChild(list);
  return card;
}
function panelOpenings(){
  const w=wrap();
  w.appendChild(openingPickerCard());
  if(S.op){
    const c=el('div','card');
    const prog=Math.min(S.opPly,S.op.line.length);
    c.innerHTML='<h2><span class="pill '+S.op.side+'">'+(S.op.side==='w'?'אתה הלבן':'אתה השחור')+'</span> '+S.op.name+'</h2>'+
      '<div class="sub">מהלך '+Math.ceil((prog+1)/2)+' · '+prog+'/'+S.op.line.length+' חצאי־מהלכים</div>'+
      coachCard();
    w.appendChild(c);
  } else {
    const c=el('div','card'); c.innerHTML=coachCard()||'<div class="coach info"><div class="tag">♟ התחל</div>בחר פתיחה מהרשימה כדי להתחיל לתרגל.</div>'; w.appendChild(c);
  }
  return w;
}
function panelPuzzles(){
  const w=wrap();
  const card=el('div','card');
  card.appendChild(el('h2',null,'<span class="k">מוטיבים</span> תרגילי רעיונות'));
  card.appendChild(el('div','sub','מצא את המהלך שממחיש את הרעיון. פתרון נכון פותח את ההסבר.'));
  const groups={};
  PUZZLES.forEach(p=>{ (groups[p.group]=groups[p.group]||[]).push(p); });
  Object.keys(groups).forEach(g=>{
    card.appendChild(el('div','sub','<b style="color:var(--green-2)">'+g+'</b>'));
    const list=el('div','select-list');
    groups[g].forEach(p=>{
      const b=el('button','opt'+(S.pz&&S.pz.theme===p.theme?' active':''));
      const done=P.puzzles[p.theme];
      b.innerHTML='<div class="badge'+(done?' done':'')+'">'+(done?'✔':'?')+'</div><div class="txt"><b>'+p.theme+'</b></div><div class="chev">‹</div>';
      b.onclick=()=>startPuzzle(p);
      list.appendChild(b);
    });
    card.appendChild(list);
  });
  w.appendChild(card);
  if(S.pz){ const c=el('div','card'); c.innerHTML='<h2>'+S.pz.theme+'</h2>'+coachCard(); w.appendChild(c); }
  return w;
}
function panelEndgames(){
  const w=wrap();
  const card=el('div','card');
  card.appendChild(el('h2',null,'<span class="k">סיומים</span> תרגול מול המחשב'));
  card.appendChild(el('div','sub','שחק את העמדה עד להשגת המטרה. המחשב מתגונן.'));
  const list=el('div','select-list');
  ENDGAMES.forEach(e=>{
    const b=el('button','opt'+(S.eg&&S.eg.id===e.id?' active':''));
    const done=P.endgames[e.id];
    b.innerHTML='<div class="badge'+(done?' done':'')+'">'+(done?'✔':'♜')+'</div><div class="txt"><b>'+e.name+'</b><small>'+e.goal+'</small></div><div class="chev">‹</div>';
    b.onclick=()=>startEndgame(e);
    list.appendChild(b);
  });
  card.appendChild(list);
  w.appendChild(card);
  if(S.eg){ const c=el('div','card'); c.innerHTML='<h2>'+S.eg.name+'</h2>'+coachCard(); w.appendChild(c); }
  return w;
}
function panelPlay(){
  const w=wrap();
  const card=el('div','card');
  card.appendChild(el('h2',null,'<span class="k">משחק חי</span> שחק מול המחשב'));
  card.appendChild(el('div','sub','משחק מלא לתרגול "חי". בחר צבע ורמת קושי.'));
  // color
  const colWrap=el('div',null,'<div class="sub" style="margin-bottom:6px">צבע</div>');
  const seg1=el('div','seg');
  [['w','לבן ♔'],['b','שחור ♚']].forEach(([v,l])=>{ const b=el('button',S.playSide===v?'on':''); b.innerHTML=l; b.onclick=()=>{S.playSide=v;startPlay();}; seg1.appendChild(b); });
  colWrap.appendChild(seg1); card.appendChild(colWrap);
  // level
  const lvlWrap=el('div',null,'<div class="sub" style="margin:12px 0 6px">רמת קושי</div>');
  const seg2=el('div','seg');
  [[1,'קל'],[2,'בינוני'],[3,'מאתגר']].forEach(([v,l])=>{ const b=el('button',S.playDepth===v?'on':''); b.textContent=l; b.onclick=()=>{S.playDepth=v; const bs=seg2.querySelectorAll('button'); bs.forEach(x=>x.classList.remove('on')); b.classList.add('on');}; seg2.appendChild(b); });
  lvlWrap.appendChild(seg2); card.appendChild(lvlWrap);
  const newBtn=el('button','ctrl primary','משחק חדש'); newBtn.style.marginTop='14px'; newBtn.style.width='100%'; newBtn.onclick=()=>startPlay();
  card.appendChild(newBtn);
  w.appendChild(card);
  if(S._coach){ const c=el('div','card'); c.innerHTML='<h2>מצב המשחק</h2>'+coachCard(); w.appendChild(c); }
  return w;
}

/* ---------------- tabs ---------------- */
function setMode(m){
  S.mode=m; S._coach=null; S.sel=-1; S.targets=[]; S.gameOver=false;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.m===m));
  if(m==='openings'){ if(S.op) startOpening(S.op); else { S.st=C.parseFEN(C.START); S.history=[]; S.last=null; renderBoard(); renderMoveList(); renderPanel(); } }
  else if(m==='puzzles'){ if(S.pz) startPuzzle(S.pz); else startPuzzle(PUZZLES[0]); }
  else if(m==='endgames'){ if(S.eg) startEndgame(S.eg); else startEndgame(ENDGAMES[0]); }
  else if(m==='play'){ startPlay(); }
}

/* ---------------- init ---------------- */
function init(){
  $('#board').addEventListener('click',onCellClick);
  document.querySelectorAll('.tab').forEach(t=>{ t.onclick=()=>setMode(t.dataset.m); });
  $('#c-undo').onclick=undo; $('#c-hint').onclick=hint; $('#c-flip').onclick=flip; $('#c-reset').onclick=resetCurrent; $('#c-next').onclick=nextPuzzle;
  $('#themeBtn').onclick=toggleTheme;
  initTheme();
  S.st=C.parseFEN(C.START);
  renderHeader();
  setMode('openings');
  startOpening(OPENINGS[0]);
}
function initTheme(){ const t=localStorage.getItem('chessTrainer.theme'); if(t) document.documentElement.setAttribute('data-theme',t); updateThemeBtn(); }
function toggleTheme(){ const cur=document.documentElement.getAttribute('data-theme'); const isDark = cur? cur==='dark' : window.matchMedia('(prefers-color-scheme:dark)').matches; const next=isDark?'light':'dark'; document.documentElement.setAttribute('data-theme',next); try{localStorage.setItem('chessTrainer.theme',next);}catch(e){} updateThemeBtn(); }
function updateThemeBtn(){ const cur=document.documentElement.getAttribute('data-theme'); const isDark = cur? cur==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches; $('#themeBtn').textContent=isDark?'☀':'☾'; }

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();

</script>
